format = """
[вЦСвЦТвЦУ](#f5f1e6)\
$hostname\
[ у∞ЊЮрЯРЩ ](bg:#f5f1e6)\
[оГЖ](bg:#f4cc20 fg:#f5f1e6)\
$directory\
[оГЖ](fg:#f4cc20 bg:#1c2121)\
$git_branch\
$git_status\
[оВі](fg:#1c2121)\
$nodejs\
$rust\
$golang\
$php\
$cmd_duration\
$fill\
$git_metrics\
\n$character
"""
# [оВі](fg:#394260 bg:#212736)

[fill]
symbol = ' '

[directory]
style = "fg:#1c2121 bg:#f4cc20"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
symbol = "пРШ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#f5f1e6 bg:#1c2121)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($conflicted$stashed$deleted $renamed$modified$staged$untracked)](fg:#f5f1e6 bg:#1c2121)]($style)'

[git_metrics]
added_style = 'fg:#9ece6a bg:#1a1b26'
deleted_style = 'fg:#9ece6a bg:#1a1b26'
format = """[оВґ](fg:#1c2121)\
					[[+$added/-$deleted](fg:#f5f1e6 bg:#1c2121)\
					[оВі](fg:#1c2121)\
					]($deleted_style)
					"""
disabled = false
# [оВґ](fg:#394260 bg:#212736)

[cmd_duration]
min_time = 1
style = 'fg:#f5f1e6'
format = "[ $duration]($style)"

[nodejs]
symbol = "оЬШ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "оЮ®"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "оШІ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "оШИ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[hostname]
ssh_only = true
format = '[$hostname](bg:#f5f1e6 fg:#1c2121)'
disabled = false
aliases = { "popyson-mbp" = "home" }

