unbind-key C-b
set-option -g prefix C-g
bind-key C-g send-prefix

set -g status-style "fg=colour254,bg=colour99"
set -g window-status-style "fg=colour254,bg=colour99"
set -g window-status-current-style "fg=colour254,bg=colour99"
set -g message-style "fg=colour254,bg=colour99"
set -g pane-border-style "fg=colour254"
set -g pane-active-border-style "fg=colour254"
set-option -ga terminal-overrides ",xterm-256color:RGB"
set -g default-terminal "screen-256color"
set -as terminal-overrides ",xterm-256color:RGB"

set -g mouse on

set-window-option -g mode-keys vi

set-option -g set-clipboard on
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "win32yank.exe -i"
